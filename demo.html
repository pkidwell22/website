<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Request a demo of Margot, a multi-agent AI desktop assistant by Mountain Meadow Systems.">
    <title>Request a Demo | Margot</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css?v=5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">
                <span class="logo-text">Mountain Meadow Systems</span>
            </a>
            <ul class="nav-links">
                <li><a href="/documentation">Documentation</a></li>
                <li><a href="/writing">Writing</a></li>
            </ul>
            <a href="/" class="btn btn-nav">Back</a>
            <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <main class="demo-page">
        <div class="container">
            <div class="form-card">
                <h1>Request a Demo</h1>
                <p class="form-subtitle">See what Margot can do for your workflow. Fill out the form and we'll be in touch.</p>
                <form action="https://formspree.io/f/xkovpopp" method="POST">
                    <div class="form-group">
                        <label class="form-label" for="name">Name</label>
                        <input class="form-input" type="text" id="name" name="name" required placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input class="form-input" type="email" id="email" name="email" required placeholder="you@company.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="company">Company</label>
                        <input class="form-input" type="text" id="company" name="company" placeholder="Company name (optional)">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="message">Message</label>
                        <textarea class="form-textarea" id="message" name="message" rows="4" placeholder="Tell me about your use case..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary form-submit">Send Request</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-row">
                <div class="footer-left">
                    <div class="footer-brand">
                        <span>Mountain Meadow Systems</span>
                    </div>
                </div>
                <div class="footer-contact">
                    <a href="mailto:patrick@mountainmeadowsystems.com" class="footer-link">patrick@mountainmeadowsystems.com</a>
                    <a href="https://www.linkedin.com/in/ptkidwell" target="_blank" rel="noopener" class="footer-link footer-linkedin">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                        LinkedIn
                    </a>
                    <a href="https://github.com/pkidwell22" target="_blank" rel="noopener" class="footer-link">GitHub</a>
                </div>
                <p class="footer-copy">&copy; 2026 Mountain Meadow Systems</p>
            </div>
        </div>
    </footer>

    <script>document.querySelector('.nav-toggle').addEventListener('click',function(){document.querySelector('.navbar').classList.toggle('open')});</script>
</body>
</html>
